<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lureworld ギャラリー</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎣</text></svg>">
<style>
  :root {
    --bg: #10151c; --panel: #1a222d; --panel2: #232e3c;
    --text: #e8edf2; --sub: #8fa0b3; --accent: #35b6ff; --like: #ff5f7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 20px; border-bottom: 1px solid #2c3948; flex-wrap: wrap; }
  h1 { font-size: 16px; }
  .sub { color: var(--sub); font-size: 11px; margin-top: 2px; }
  .hbtns { display: flex; gap: 8px; align-items: center; }
  .hbtns .who { color: var(--sub); font-size: 12px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  header a, header button, .btn {
    color: var(--accent); text-decoration: none; font-size: 13px; background: var(--panel2);
    border: 1px solid #3d4d61; padding: 8px 14px; border-radius: 8px; white-space: nowrap; cursor: pointer;
  }
  header a:hover, header button:hover, .btn:hover { filter: brightness(1.15); }
  .btn.primary { background: var(--accent); color: #06283c; font-weight: bold; border: none; }
  #toolbar { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; padding: 14px 20px 0; max-width: 1200px; margin: 0 auto; }
  #toolbar select { background: var(--panel2); color: var(--text); border: 1px solid #3d4d61; border-radius: 6px; padding: 6px 8px; font-size: 12.5px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-size: 12px; padding: 5px 11px; border-radius: 999px; cursor: pointer;
    background: var(--panel); border: 1px solid #3d4d61; color: var(--sub); user-select: none;
  }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #06283c; font-weight: bold; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; padding: 16px 20px 32px; max-width: 1200px; margin: 0 auto; }
  .card { background: var(--panel); border: 1px solid #2c3948; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform .12s, border-color .12s; }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .card img, .card .noimg { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; background: #0c1117; }
  .card .noimg { display: flex; align-items: center; justify-content: center; color: var(--sub); font-size: 30px; }
  .meta { padding: 10px 12px; }
  .name { font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .by { font-size: 11px; color: var(--sub); margin-top: 3px; }
  .remix { font-size: 10.5px; color: var(--accent); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tagrow { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-top: 8px; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; color: var(--sub); background: var(--panel2); border-radius: 4px; padding: 2px 6px; }
  .likeBtn {
    display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--sub);
    background: none; border: 1px solid #3d4d61; border-radius: 999px; padding: 3px 10px; cursor: pointer;
  }
  .likeBtn.liked { color: var(--like); border-color: var(--like); }
  .likeBtn:hover { filter: brightness(1.25); }
  #status { text-align: center; color: var(--sub); padding: 48px 20px; font-size: 13px; grid-column: 1 / -1; }
  footer { text-align: center; color: var(--sub); font-size: 12px; padding: 24px; border-top: 1px solid #2c3948; }
  footer a { color: var(--sub); margin: 0 8px; }

  /* 詳細オーバーレイ */
  #overlay { position: fixed; inset: 0; background: rgba(5, 8, 12, 0.78); display: none; align-items: flex-start; justify-content: center; padding: 4vh 16px; z-index: 10; overflow-y: auto; }
  #overlay.open { display: flex; }
  #detail { background: var(--panel); border: 1px solid #3d4d61; border-radius: 14px; max-width: 720px; width: 100%; overflow: hidden; }
  #detail .hero { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #0c1117; }
  #detail .body { padding: 16px 18px 20px; }
  #detail .titleRow { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  #detail h2 { font-size: 17px; }
  #detail .closeBtn { background: none; border: none; color: var(--sub); font-size: 20px; cursor: pointer; padding: 2px 6px; }
  #detail .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  #detail h3 { font-size: 13px; color: var(--accent); margin: 20px 0 8px; }
  .photoGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .photoGrid figure { position: relative; }
  .photoGrid img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; display: block; background: #0c1117; }
  .photoGrid figcaption { font-size: 10.5px; color: var(--sub); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .photoDel { position: absolute; top: 4px; right: 4px; background: rgba(10,14,19,0.75); border: none; color: #f87171; border-radius: 6px; font-size: 11px; padding: 2px 7px; cursor: pointer; }
  .reportLink { background: none; border: none; color: var(--sub); font-size: 11px; cursor: pointer; text-decoration: underline; padding: 0; }
  .noteSm { font-size: 11px; color: var(--sub); margin-top: 6px; line-height: 1.6; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🎣 lureworld ギャラリー</h1>
    <div class="sub">みんなの公開デザイン。開いてリミックスできる</div>
  </div>
  <div class="hbtns">
    <span class="who" id="who"></span>
    <button id="loginBtn" style="display:none">Google でログイン</button>
    <a href="index.html">＋ デザインを作る</a>
  </div>
</header>

<div id="toolbar">
  <select id="sortSel">
    <option value="new">新着順</option>
    <option value="popular">人気順</option>
  </select>
  <div class="chips" id="typeChips"></div>
  <div class="chips" id="sizeChips"></div>
</div>

<div id="grid"><div id="status">読み込み中…</div></div>

<div id="overlay"><div id="detail"></div></div>
<input type="file" id="photoFile" accept="image/*" style="display:none">

<footer>
  <a href="terms.html">利用規約</a>・<a href="privacy.html">プライバシーポリシー</a>
</footer>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://guvobgzpchkohpboqqko.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1dm9iZ3pwY2hrb2hwYm9xcWtvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTM4OTMsImV4cCI6MjA5OTM2OTg5M30.1yHRIaX6pLCHRxyghrbOcZIEvhBGvRtflVHbS5H0QuI';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = id => document.getElementById(id);
const grid = $('grid');

const TYPES = ['すべて', 'ミノー', 'クランク', 'ポッパー', 'ペンシル・トップ'];
const SIZES = ['すべて', '〜60mm', '60〜100mm', '100mm〜'];
let typeFilter = 'すべて', sizeFilter = 'すべて', sortMode = 'new';
let designs = [];
let session = null;
let currentDetail = null;
const myLikes = new Set();

// params_json から自動タグ分類(投稿者の操作は不要)
function classify(p) {
  if (!p) return { type: 'その他', size: '-' };
  const type = p.cupOn ? 'ポッパー'
    : !p.lipOn ? 'ペンシル・トップ'
    : p.lipAngle >= 45 ? 'クランク'
    : 'ミノー';
  const size = p.length < 60 ? '〜60mm' : p.length < 100 ? '60〜100mm' : '100mm〜';
  return { type, size };
}

function buildChips(el, items, get, set) {
  el.innerHTML = '';
  for (const it of items) {
    const c = document.createElement('span');
    c.className = 'chip' + (get() === it ? ' on' : '');
    c.textContent = it;
    c.addEventListener('click', () => { set(it); buildChips(el, items, get, set); render(); });
    el.appendChild(c);
  }
}

function updateAuthUI() {
  $('loginBtn').style.display = session ? 'none' : '';
  $('who').textContent = session ? (session.user.user_metadata?.name || session.user.email) : '';
}

function signIn() {
  supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: location.origin + location.pathname } });
}

async function loadMyLikes() {
  myLikes.clear();
  if (!session || !designs.length) return;
  const { data } = await supabase
    .from('likes').select('design_id')
    .eq('user_id', session.user.id)
    .in('design_id', designs.map(d => d.id));
  for (const r of data ?? []) myLikes.add(r.design_id);
}

function makeLikeButton(d) {
  const btn = document.createElement('button');
  btn.className = 'likeBtn' + (myLikes.has(d.id) ? ' liked' : '');
  const heart = document.createElement('span');
  heart.textContent = '♥';
  const cnt = document.createElement('span');
  cnt.textContent = d.likeCount;
  btn.append(heart, cnt);
  btn.addEventListener('click', async e => {
    e.stopPropagation();
    if (!session) { signIn(); return; }
    if (myLikes.has(d.id)) {
      const { error } = await supabase.from('likes').delete().eq('design_id', d.id).eq('user_id', session.user.id);
      if (error) return;
      myLikes.delete(d.id);
      d.likeCount = Math.max(0, d.likeCount - 1);
    } else {
      const { error } = await supabase.from('likes').insert({ design_id: d.id });
      if (error) return;
      myLikes.add(d.id);
      d.likeCount++;
    }
    render();
    if (currentDetail?.id === d.id) openDetail(d);   // 開いている詳細も更新
  });
  return btn;
}

function render() {
  grid.innerHTML = '';
  let list = designs.filter(d =>
    (typeFilter === 'すべて' || d.tags.type === typeFilter) &&
    (sizeFilter === 'すべて' || d.tags.size === sizeFilter));
  if (sortMode === 'popular') {
    list = [...list].sort((a, b) => b.likeCount - a.likeCount || (a.updated_at < b.updated_at ? 1 : -1));
  }
  if (!list.length) {
    const st = document.createElement('div');
    st.id = 'status';
    st.textContent = designs.length ? 'この条件のデザインはまだない' : 'まだ公開デザインがない。最初の1匹を投稿しよう!';
    grid.appendChild(st);
    return;
  }
  for (const d of list) {
    // ユーザー投稿データはinnerHTMLに入れず、DOM APIとtextContentで組み立てる(XSS対策)
    const card = document.createElement('div');
    card.className = 'card';
    card.addEventListener('click', () => openDetail(d));

    if (typeof d.thumb === 'string' && d.thumb.startsWith('data:image/')) {
      const img = document.createElement('img');
      img.src = d.thumb; img.alt = '';
      card.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'noimg'; ph.textContent = '🎣';
      card.appendChild(ph);
    }

    const meta = document.createElement('div');
    meta.className = 'meta';
    const name = document.createElement('div');
    name.className = 'name'; name.textContent = d.name;
    const by = document.createElement('div');
    by.className = 'by';
    by.textContent = `by ${d.profiles?.display_name ?? 'angler'} ・ ${new Date(d.updated_at).toLocaleDateString('ja-JP')}`;
    meta.append(name, by);
    if (d.remix?.name) {
      const rm = document.createElement('div');
      rm.className = 'remix'; rm.textContent = `↻ リミックス元: ${d.remix.name}`;
      meta.appendChild(rm);
    }

    const tagrow = document.createElement('div');
    tagrow.className = 'tagrow';
    const tags = document.createElement('div');
    tags.className = 'tags';
    for (const t of [d.tags.type, d.tags.size]) {
      const tg = document.createElement('span');
      tg.className = 'tag'; tg.textContent = t;
      tags.appendChild(tg);
    }
    tagrow.append(tags, makeLikeButton(d));
    meta.appendChild(tagrow);

    card.appendChild(meta);
    grid.appendChild(card);
  }
}

/* ---- 詳細オーバーレイ ---- */

const photoUrl = path => `${SUPABASE_URL}/storage/v1/object/public/photos/${path}`;

function openDetail(d) {
  currentDetail = d;
  const box = $('detail');
  box.innerHTML = '';

  if (typeof d.thumb === 'string' && d.thumb.startsWith('data:image/')) {
    const hero = document.createElement('img');
    hero.className = 'hero'; hero.src = d.thumb; hero.alt = '';
    box.appendChild(hero);
  }

  const body = document.createElement('div');
  body.className = 'body';

  const titleRow = document.createElement('div');
  titleRow.className = 'titleRow';
  const h2 = document.createElement('h2');
  h2.textContent = d.name;
  const closeBtn = document.createElement('button');
  closeBtn.className = 'closeBtn'; closeBtn.textContent = '✕';
  closeBtn.addEventListener('click', closeDetail);
  titleRow.append(h2, closeBtn);
  body.appendChild(titleRow);

  const by = document.createElement('div');
  by.className = 'by';
  by.textContent = `by ${d.profiles?.display_name ?? 'angler'} ・ ${new Date(d.updated_at).toLocaleDateString('ja-JP')} ・ ${d.tags.type} / ${d.tags.size}`;
  body.appendChild(by);
  if (d.remix?.name) {
    const rm = document.createElement('div');
    rm.className = 'remix'; rm.textContent = `↻ リミックス元: ${d.remix.name}`;
    body.appendChild(rm);
  }

  const actions = document.createElement('div');
  actions.className = 'actions';
  const open = document.createElement('a');
  open.className = 'btn primary';
  open.href = `index.html?design=${encodeURIComponent(d.id)}`;
  open.textContent = 'エディタで開く(リミックス)';
  actions.append(open, makeLikeButton(d));
  const rep = document.createElement('button');
  rep.className = 'reportLink';
  rep.textContent = '⚑ このデザインを通報';
  rep.addEventListener('click', () => report('design', d.id));
  actions.appendChild(rep);
  body.appendChild(actions);

  const h3 = document.createElement('h3');
  h3.textContent = '🎣 釣果・プリント写真';
  body.appendChild(h3);

  const pg = document.createElement('div');
  pg.className = 'photoGrid';
  pg.textContent = '読み込み中…';
  body.appendChild(pg);

  const up = document.createElement('div');
  up.style.marginTop = '10px';
  const upBtn = document.createElement('button');
  upBtn.className = 'btn';
  upBtn.textContent = '📷 写真を投稿';
  upBtn.addEventListener('click', () => {
    if (!session) { signIn(); return; }
    $('photoFile').onchange = e => {
      const f = e.target.files[0];
      e.target.value = '';
      if (f) uploadPhoto(d, f, pg);
    };
    $('photoFile').click();
  });
  up.appendChild(upBtn);
  const note = document.createElement('div');
  note.className = 'noteSm';
  note.textContent = 'このデザインで作った実物や釣果の写真を共有しよう(5MBまで/自動縮小)。不適切な写真は通報から。';
  up.appendChild(note);
  body.appendChild(up);

  box.appendChild(body);
  $('overlay').classList.add('open');
  loadPhotos(d, pg);
}

function closeDetail() {
  currentDetail = null;
  $('overlay').classList.remove('open');
}
$('overlay').addEventListener('click', e => { if (e.target === $('overlay')) closeDetail(); });

async function loadPhotos(d, pg) {
  const { data, error } = await supabase
    .from('design_photos')
    .select('id,path,caption,user_id,created_at,profiles(display_name)')
    .eq('design_id', d.id)
    .order('created_at', { ascending: false });
  pg.textContent = '';
  if (error) { pg.textContent = `写真を読み込めなかった: ${error.message}`; return; }
  if (!data.length) {
    const empty = document.createElement('div');
    empty.className = 'noteSm';
    empty.textContent = 'まだ写真がない。最初の1枚を投稿しよう!';
    pg.appendChild(empty);
    return;
  }
  for (const ph of data) {
    const fig = document.createElement('figure');
    const a = document.createElement('a');
    a.href = photoUrl(ph.path);
    a.target = '_blank';
    a.rel = 'noopener';
    const img = document.createElement('img');
    img.src = photoUrl(ph.path);
    img.alt = '';
    img.loading = 'lazy';
    a.appendChild(img);
    fig.appendChild(a);
    const cap = document.createElement('figcaption');
    const who = ph.profiles?.display_name ?? 'angler';
    cap.textContent = ph.caption ? `${ph.caption} — ${who}` : `by ${who}`;
    fig.appendChild(cap);

    const canDelete = session && (ph.user_id === session.user.id || d.user_id === session.user.id);
    if (canDelete) {
      const del = document.createElement('button');
      del.className = 'photoDel';
      del.textContent = '削除';
      del.addEventListener('click', async () => {
        if (!confirm('この写真を削除する？')) return;
        const { error: e1 } = await supabase.from('design_photos').delete().eq('id', ph.id);
        if (e1) return;
        if (ph.user_id === session.user.id) await supabase.storage.from('photos').remove([ph.path]);
        loadPhotos(d, pg);
      });
      fig.appendChild(del);
    } else if (session) {
      const rp = document.createElement('button');
      rp.className = 'photoDel';
      rp.style.color = 'var(--sub)';
      rp.textContent = '⚑';
      rp.title = 'この写真を通報';
      rp.addEventListener('click', () => report('photo', ph.id));
      fig.appendChild(rp);
    }
    pg.appendChild(fig);
  }
}

// アップロード前にブラウザ側で縮小(最大1600px, JPEG)
function resizeImage(file, maxDim = 1600, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const sc = Math.min(1, maxDim / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * sc);
      c.height = Math.round(img.height * sc);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(img.src);
      c.toBlob(b => b ? resolve(b) : reject(new Error('画像の変換に失敗')), 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('画像を読み込めない')); };
    img.src = URL.createObjectURL(file);
  });
}

async function uploadPhoto(d, file, pg) {
  try {
    const caption = (prompt('ひとこと(任意):') ?? '').slice(0, 100);
    const blob = await resizeImage(file);
    const path = `${session.user.id}/${crypto.randomUUID()}.jpg`;
    const { error: e1 } = await supabase.storage.from('photos').upload(path, blob, { contentType: 'image/jpeg' });
    if (e1) throw e1;
    const { error: e2 } = await supabase.from('design_photos').insert({ design_id: d.id, path, caption });
    if (e2) throw e2;
    loadPhotos(d, pg);
  } catch (e) {
    alert(`投稿に失敗した: ${e.message ?? e}`);
  }
}

async function report(type, id) {
  if (!session) { signIn(); return; }
  const reason = prompt('通報理由(任意):');
  if (reason === null) return;
  const { error } = await supabase.from('reports').insert({ target_type: type, target_id: id, reason: reason.slice(0, 300) });
  alert(error ? `通報に失敗した: ${error.message}` : '通報を受け付けた。確認のうえ対応する。');
}

/* ---- 初期化 ---- */

$('sortSel').addEventListener('change', () => { sortMode = $('sortSel').value; render(); });
$('loginBtn').addEventListener('click', signIn);
buildChips($('typeChips'), TYPES, () => typeFilter, v => typeFilter = v);
buildChips($('sizeChips'), SIZES, () => sizeFilter, v => sizeFilter = v);

session = (await supabase.auth.getSession()).data.session;
updateAuthUI();
supabase.auth.onAuthStateChange(async (_ev, s) => {
  session = s;
  updateAuthUI();
  await loadMyLikes();
  render();
});

const { data, error } = await supabase
  .from('designs')
  .select('id,name,thumb,updated_at,user_id,params_json,profiles!designs_user_profile_fkey(display_name),remix:remix_of(name),likes(count)')
  .eq('is_public', true)
  .order('updated_at', { ascending: false })
  .limit(60);

if (error) {
  grid.innerHTML = '';
  const st = document.createElement('div');
  st.id = 'status';
  st.textContent = `読み込みに失敗した: ${error.message}`;
  grid.appendChild(st);
} else {
  designs = (data ?? []).map(d => ({
    ...d,
    likeCount: d.likes?.[0]?.count ?? 0,
    tags: classify(d.params_json),
  }));
  await loadMyLikes();
  render();
}
</script>
</body>
</html>
